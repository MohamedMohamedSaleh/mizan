name: mizan
description: "Mizan - Accounting App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Routing
  go_router: ^15.1.2

  # Dependency Injection
  get_it: ^8.0.3

  # Remote Backend
  supabase_flutter: ^2.10.1

  # Local Database
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  path: ^1.9.1

  # Localization
  easy_localization: ^3.0.7

  # Serialization
  json_annotation: ^4.9.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  connectivity_plus: ^6.1.4
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.2
  toastification: ^3.2.0

  # UI
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  drift_dev: ^2.24.0
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/images/
    - assets/icons/
    - assets/fonts/
